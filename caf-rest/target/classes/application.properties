#
# These are the same as the defaults.
#
quarkus.package.jar.type=fast-jar
quarkus.http.port=8080
%dev.quarkus.http.port=5050
#
# Container image build
#
quarkus.container-image.build=true
quarkus.container-image.group=cs594
quarkus.container-image.name=caf-rest
#
# Logging
#
quarkus.log.category."io.quarkus.smallrye.jwt".level=TRACE
quarkus.log.category."io.quarkus.oidc".level=TRACE
#
# TODO OIDC properties
#
quarkus.oidc.auth-server-url=http://keycloak:8180/realms/caf
quarkus.oidc.client-id=caf-rest
quarkus.oidc.application-type=service

#
# TODO Endpoint URL for the microservice
#
quarkus.rest-client.caf-thumbnail-api.url=http://caf-thumbnail:4040

#
# TODO JWT configuration for client
#
smallrye.jwt.sign.key.location=/privateKey.pem
caf.jwt.issuer=https://caf-rest
caf.jwt.audience=caf-thumbnail

#
# TODO Configuration properties
#
caf.image.bucket=caf-images
caf.thumbnail.maxwidth=200
caf.thumbnail.maxheight=200
